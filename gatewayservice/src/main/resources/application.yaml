server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service-auth
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            - id: user-service-users
              uri: http://localhost:8081
              predicates:
                - Path=/api/user/**

            - id: restaurant-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/restaurants/**,/api/menu-items/**

            - id: order-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/orders/**

jwt:
  secret: super-secret-key-super-secret-key-123456

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics