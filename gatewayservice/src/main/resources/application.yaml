server:
  port: 8081

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service-auth
              uri: http://localhost:8083
              predicates:
                - Path=/api/auth/**

            - id: user-service-users
              uri: http://localhost:8083
              predicates:
                - Path=/api/user/**

jwt:
  secret: super-secret-key-super-secret-key-123456

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics