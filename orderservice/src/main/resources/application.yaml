spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:8093/orderservice_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate.ddl-auto: create-drop
    show-sql: true
    properties.hibernate.format_sql: true
    open-in-view: false

server:
  port: 8083
